name: CMake Build and Install

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.os_name }} Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            os_name: linux
          - os: windows-latest
            os_name: windows
          - os: macos-latest
            os_name: macos
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'pandorica_graphics/vcpkg.json'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libx11-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libxss-dev libxtst-dev

      - name: Configure CMake
        run: >
          cmake -S pandorica_graphics -B pandorica_graphics/build
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace
          }}/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build Library
        run: cmake --build pandorica_graphics/build --config Release

      - name: Install to Local Directory
        run: |
          cmake --install pandorica_graphics/build --prefix ./dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PGEngine-${{ matrix.os_name }}
          path: ./dist

  publish:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files

      - name: Zip Artifacts
        run: |
          cd release-files
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
